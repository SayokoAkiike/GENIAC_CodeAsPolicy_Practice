# Sample tasks for the Toy Robot Environment.
#
# Each task defines its own small self-contained world (robot_location,
# object_locations, locations, objects). Healthcare/assistive tasks are
# limited to object transport / tidying only -- no medication administration
# or clinical actions are modeled.

- task_id: task_001
  instruction: "赤いブロックを青い棚に置いてください"
  initial_state:
    robot_location: table
    object_locations:
      red_block: table
    locations: [table, blue_shelf]
    objects: [red_block]
  goal_state:
    object_locations:
      red_block: blue_shelf
  difficulty: easy
  category: household
  expected_objects: [red_block]
  expected_locations: [table, blue_shelf]

